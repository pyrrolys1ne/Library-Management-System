<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}图书馆信息管理系统{% endblock %}</title>
    
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Element Plus -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    <script src="https://unpkg.com/element-plus"></script>
    <!-- Element Plus Icons -->
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <!-- Axios -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <style>
        body { margin: 0; background-color: #f2f3f5; font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; }
        #app { min-height: 100vh; display: flex; flex-direction: column; }
        .system-header { background-color: #409EFF; color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header-content { display: flex; justify-content: space-between; align-items: center; height: 60px; padding: 0 20px;}
        .system-title { font-size: 20px; font-weight: bold; margin: 0;}
        .main-container { padding: 20px; flex: 1; }
        
        [v-cloak] { display: none; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div id="app" v-cloak>
        <header class="system-header">
            <div class="header-content">
                <h1 class="system-title">📚 图书馆信息管理系统</h1>
                <div>
                    {% block header_actions %}
                    {% endblock %}
                </div>
            </div>
        </header>
        <main class="main-container">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- 注册全局图标 -->
    <script>
        function registerIcons(app) {
            for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
                app.component(key, component)
            }
        }
    </script>
    
    <!-- Vue 脚本 -->
    {% block scripts %}{% endblock %}
</body>
</html>
